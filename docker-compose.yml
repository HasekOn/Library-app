services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: library
      DB_USERNAME: library_user
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - library-net

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: library
      MYSQL_USER: library_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library-net

volumes:
  db-data:

networks:
  library-net:
