apiVersion: kustomize.config.k8s.io/v1beta1
kind: Customization

namespace: library-staging

resources:
  - ../../base

namePrefix: staging-

patches:
  - target:
      kind: ConfigMap
      name: library-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: "staging"
      - op: replace
        path: /data/APP_DEBUG
        value: "true"

  - target:
      kind: Deployment
      name: library-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: Namespace
      name: library-app
    patch: |
      - op: replace
        path: /metadata/name
        value: "library-staging"

  - target:
      kind: Ingress
      name: library-app
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: "staging.library.local"
